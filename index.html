<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="not JJAM">
<meta name="theme-color" content="#faf6f1">
<title>not JJAM — 유통기한 관리</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #faf6f1;
  --bg2: #ffffff;
  --bg3: #f2ebe2;
  --border: rgba(160,120,80,0.15);
  --border2: rgba(160,120,80,0.25);
  --text: #2c1f12;
  --text2: #8a6e58;
  --text3: #b8a090;
  --red: #c94a32;
  --red-bg: rgba(201,74,50,0.09);
  --amber: #b07820;
  --amber-bg: rgba(176,120,32,0.1);
  --green: #7a5c38;
  --green-bg: rgba(122,92,56,0.1);
  --blue: #6b7fa8;
  --blue-bg: rgba(107,127,168,0.1);
  --radius: 14px;
  --radius-sm: 8px;
  font-family: 'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: 52px 20px 16px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.app-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #7a5c38;
}
.app-name span { color: var(--green); }

.store-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
}
.store-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 8px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.stat-n {
  font-size: 22px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-n.red { color: var(--red); }
.stat-n.amber { color: var(--amber); }
.stat-n.green { color: var(--green); }
.stat-l { font-size: 11px; color: var(--text3); }

/* ── TABS ── */
.tabs {
  display: flex;
  padding: 0 20px;
  gap: 2px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 152px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px 4px;
  text-align: center;
  font-size: 13px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  color: var(--text);
  border-bottom-color: var(--green);
  font-weight: 500;
}

/* ── CONTENT ── */
.page { display: none; padding: 16px 20px 100px; }
.page.active { display: block; }

/* ── ALERT STRIP ── */
.alert-strip {
  background: var(--red-bg);
  border: 1px solid rgba(201,74,50,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  color: #a03020;
  margin-bottom: 14px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  line-height: 1.5;
}
.alert-strip.hidden { display: none; }

/* ── FILTER CHIPS ── */
.chips {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.chip.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  font-weight: 500;
}

/* ── ITEM CARD ── */
.item-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}
.item-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.item-card.urgent::before { background: var(--red); }
.item-card.warn::before { background: var(--amber); }
.item-card.ok::before { background: var(--green); }
.item-card:active { background: var(--bg3); }

.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.item-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  padding-right: 8px;
}
.item-badge {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge-urgent { background: var(--red-bg); color: var(--red); }
.badge-warn { background: var(--amber-bg); color: var(--amber); }
.badge-ok { background: var(--green-bg); color: var(--green); }

.item-meta {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 8px;
}

.progress {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.fill-urgent { background: var(--red); }
.fill-warn { background: var(--amber); }
.fill-ok { background: var(--green); }

.delete-btn {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 24px; height: 24px;
  background: rgba(255,68,68,0.15);
  border: none;
  border-radius: 6px;
  color: var(--red);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.item-card:hover .delete-btn,
.item-card:active .delete-btn { opacity: 1; }

/* ── SCAN PAGE ── */
.cam-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.cam-view {
  width: 100%;
  height: 220px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#cam-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
}
.cam-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
}
.cam-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.cam-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.cam-label { font-size: 13px; color: var(--text3); }

.scan-frame {
  position: absolute;
  width: 180px; height: 120px;
  display: none;
}
.scan-frame.show { display: block; }
.scan-frame::before, .scan-frame::after,
.scan-frame span::before, .scan-frame span::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: #7a5c38;
  border-style: solid;
  border-width: 0;
}
.scan-frame::before { top:0;left:0; border-top-width:2px; border-left-width:2px; }
.scan-frame::after { top:0;right:0; border-top-width:2px; border-right-width:2px; }
.scan-frame span::before { bottom:0;left:0; border-bottom-width:2px; border-left-width:2px; }
.scan-frame span::after { bottom:0;right:0; border-bottom-width:2px; border-right-width:2px; }

.scan-line-anim {
  position: absolute;
  left: 10px; right: 10px;
  height: 1px;
  background: #7a5c38;
  box-shadow: 0 0 6px rgba(122,92,56,0.5);
  display: none;
  animation: scanLine 1.8s ease-in-out infinite;
}
.scan-line-anim.show { display: block; }
@keyframes scanLine {
  0% { top: 10px; opacity: 0.4; }
  50% { top: 110px; opacity: 1; }
  100% { top: 10px; opacity: 0.4; }
}

.cam-status {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text2);
  border-top: 1px solid var(--border);
  min-height: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.active { background: var(--green); animation: pulse 1s infinite; }
.status-dot.done { background: var(--green); animation: none; }
.status-dot.error { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── AI RESULT ── */
.ai-result {
  background: var(--bg2);
  border: 1px solid rgba(68,136,255,0.3);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: none;
}
.ai-result.show { display: block; }
.ai-result-header {
  font-size: 11px;
  color: var(--blue);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ai-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.ai-row:last-of-type { border-bottom: none; }
.ai-row-label { color: var(--text2); }
.ai-row-val { color: var(--text); font-weight: 500; }

/* ── FORM ── */
.form-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.form-section-title {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
}
.field input, .field select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus {
  border-color: var(--green);
}
.field select option { background: var(--bg2); }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: #7a5c38;
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  margin-bottom: 8px;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.99); }
.btn-secondary {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--text2); color: var(--text); }

/* ── NOTIFICATION PAGE ── */
.notif-group-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 16px 0 8px;
}
.notif-group-label:first-child { margin-top: 0; }
.notif-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.notif-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.ni-red { background: var(--red-bg); color: var(--red); }
.ni-amber { background: var(--amber-bg); color: var(--amber); }
.ni-blue { background: var(--blue-bg); color: var(--blue); }
.ni-green { background: var(--green-bg); color: var(--green); }
.notif-body { flex: 1; }
.notif-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.notif-sub { font-size: 12px; color: var(--text2); line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(250,246,241,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 24px;
  z-index: 200;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px 0;
  transition: opacity 0.15s;
}
.nav-item:active { opacity: 0.6; }
.nav-icon-wrap {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
}
.nav-label { font-size: 10px; color: var(--text3); transition: color 0.2s; }
.nav-item.active .nav-label { color: #7a5c38; font-weight: 500; }

/* ── INSTALL BANNER ── */
.install-banner {
  background: var(--bg2);
  border: 1px solid rgba(122,92,56,0.3);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: none;
}
.install-banner.show { display: block; }
.install-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.install-steps { font-size: 12px; color: var(--text2); line-height: 1.8; }
.install-steps b { color: #7a5c38; font-weight: 500; }
.install-close {
  float: right;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  margin-top: -2px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.empty-text { font-size: 14px; }

/* ── STORE MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: none;
  align-items: flex-end;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--bg2);
  border-radius: var(--radius) var(--radius) 0 0;
  border-top: 1px solid var(--border2);
  padding: 20px 20px 40px;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
}
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.store-opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.store-opt:last-child { border-bottom: none; }
.store-opt-dot { width: 10px; height: 10px; border-radius: 50%; background: #7a5c38; }
.store-opt-name { font-size: 15px; color: var(--text); }
.store-opt-check { margin-left: auto; color: #7a5c38; font-size: 18px; display: none; }
.store-opt.selected .store-opt-check { display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="app-name"><span style="font-size:13px;font-weight:400;opacity:0.6;letter-spacing:0">not </span>JJAM</div>
    <div class="store-pill" onclick="openStoreModal()">
      <div class="store-dot"></div>
      <span id="current-store-name">송도점</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="#888" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-n red" id="stat-urgent">0</div>
      <div class="stat-l">긴급 소진</div>
    </div>
    <div class="stat">
      <div class="stat-n amber" id="stat-soon">0</div>
      <div class="stat-l">1주일 내</div>
    </div>
    <div class="stat">
      <div class="stat-n green" id="stat-total">0</div>
      <div class="stat-l">전체 품목</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchPage('list')">재고 목록</div>
  <div class="tab" onclick="switchPage('scan')">스캔 등록</div>
  <div class="tab" onclick="switchPage('notif')">알림</div>
</div>

<!-- PAGE: LIST -->
<div id="page-list" class="page active">
  <div class="alert-strip hidden" id="alert-strip">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px"><circle cx="8" cy="8" r="7" stroke="#ff4444" stroke-width="1.2"/><path d="M8 5v3.5M8 10.5v.5" stroke="#ff4444" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span id="alert-text"></span>
  </div>

  <div class="chips">
    <div class="chip active" onclick="filterBy(this,'all')">전체</div>
    <div class="chip" onclick="filterBy(this,'urgent')">긴급</div>
    <div class="chip" onclick="filterBy(this,'warn')">주의</div>
    <div class="chip" onclick="filterBy(this,'ok')">양호</div>
    <div class="chip" onclick="filterBy(this,'육류')">육류</div>
    <div class="chip" onclick="filterBy(this,'소스')">소스</div>
    <div class="chip" onclick="filterBy(this,'채소')">채소</div>
    <div class="chip" onclick="filterBy(this,'유제품')">유제품</div>
  </div>

  <div id="item-list"></div>
</div>

<!-- PAGE: SCAN -->
<div id="page-scan" class="page">
  <!-- iOS install banner -->
  <div class="install-banner" id="install-banner">
    <button class="install-close" onclick="document.getElementById('install-banner').classList.remove('show')">×</button>
    <div class="install-title">홈 화면에 추가하면 더 편해요!</div>
    <div class="install-steps">
      <b>아이폰:</b> Safari → 공유 버튼 → "홈 화면에 추가"<br>
      <b>안드로이드:</b> Chrome → 메뉴 → "앱 설치"
    </div>
  </div>

  <div class="cam-box">
    <div class="cam-view">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div class="cam-overlay" id="cam-overlay">
        <div class="cam-placeholder" id="cam-placeholder">
          <div class="cam-icon">
            <svg width="22" height="20" viewBox="0 0 22 20" fill="none">
              <rect x="1" y="5" width="20" height="14" rx="3" stroke="#555" stroke-width="1.5"/>
              <circle cx="11" cy="12" r="4" stroke="#555" stroke-width="1.5"/>
              <path d="M7.5 5V4C7.5 3 8.3 2 9.5 2h3c1.2 0 2 1 2 2v1" stroke="#555" stroke-width="1.5"/>
            </svg>
          </div>
          <span class="cam-label">카메라를 눌러 스캔 시작</span>
        </div>
      </div>
      <div class="scan-frame" id="scan-frame"><span></span></div>
      <div class="scan-line-anim" id="scan-line"></div>
    </div>
    <div class="cam-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">카메라 버튼을 눌러 스캔하세요</span>
    </div>
  </div>

  <button class="btn-primary" id="scan-btn" onclick="toggleCamera()">카메라 스캔 시작</button>
  <button class="btn-secondary" onclick="toggleManual()">직접 입력하기</button>

  <div class="ai-result" id="ai-result">
    <div class="ai-result-header">
      <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#4488ff" opacity="0.3"/><circle cx="6" cy="6" r="2.5" fill="#4488ff"/></svg>
      AI 인식 결과 — 확인 후 등록하세요
    </div>
    <div class="ai-row"><span class="ai-row-label">상품명</span><span class="ai-row-val" id="r-name">—</span></div>
    <div class="ai-row"><span class="ai-row-label">카테고리</span><span class="ai-row-val" id="r-cat">—</span></div>
    <div class="ai-row"><span class="ai-row-label">입고일</span><span class="ai-row-val" id="r-in">—</span></div>
    <div class="ai-row"><span class="ai-row-label">소비기한</span><span class="ai-row-val" id="r-exp">—</span></div>
    <div class="ai-row"><span class="ai-row-label">남은 기간</span><span class="ai-row-val" id="r-days" style="color:var(--green)">—</span></div>
  </div>

  <div id="manual-form" style="display:none">
    <div class="form-section">
      <div class="form-section-title">상품 정보 입력</div>
      <div class="field">
        <label>상품명 *</label>
        <input id="f-name" type="text" placeholder="예) 국산 삼겹살 500g">
      </div>
      <div class="field">
        <label>카테고리</label>
        <select id="f-cat">
          <option value="육류">육류</option>
          <option value="소스">소스/양념</option>
          <option value="채소">채소</option>
          <option value="유제품">유제품</option>
          <option value="냉동식품">냉동식품</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="field">
        <label>입고일 *</label>
        <input id="f-in" type="date">
      </div>
      <div class="field">
        <label>소비기한 *</label>
        <input id="f-exp" type="date">
      </div>
      <div class="field">
        <label>수량 / 메모</label>
        <input id="f-memo" type="text" placeholder="예) 2팩, 냉동보관">

    <button class="btn-primary" onclick="saveItem()">등록하기</button>

</div>

</div>

<div class="bottom-nav">

        <rect x="3" y="15" width="10" height="2" rx="1" fill="currentColor" opacity="0.5"/>
      </svg>
    </div>
    <span class="nav-label">재고</span>
  </div>
  <div class="nav-item" id="nav-scan" onclick="switchPage('scan')">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="7" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
        <rect x="13" y="7" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
        <rect x="3" y="10" width="16" height="1.5" rx="0.75" fill="currentColor"/>

        <path d="M10 2C7 2 5 4 5 7v5.5L3 14h14l-2-1.5V7C15 4 13 2 10 2z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/>
        <path d="M7.5 17c0 1.4 1.1 2.5 2.5 2.5s2.5-1.1 2.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <div id="notif-badge" style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg);display:none"></div>

    <span class="nav-label">알림</span>
  </div>
</div>

<!-- STORE MODAL -->
<div class="modal-backdrop" id="store-modal" onclick="closeStoreModal(event)">
  <div class="modal">
    <div class="modal-title">매장 선택</div>
    <div id="store-list"></div>
  </div>
</div>

<script>
// ── STATE ──
const STORES = ['송도점','구월점','연수점'];
let currentStore = localStorage.getItem('currentStore') || '송도점';
let currentFilter = 'all';
let cameraActive = false;
let manualOpen = false;
let stream = null;

function getItems() {
  const key = 'items_' + currentStore;
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch(e) { return []; }
}
function saveItems(items) {
  localStorage.setItem('items_' + currentStore, JSON.stringify(items));
}
function getNotifs() {
  try { return JSON.parse(localStorage.getItem('notifs')) || []; }
  catch(e) { return []; }
}
function saveNotifs(n) { localStorage.setItem('notifs', JSON.stringify(n)); }

// ── SEED DATA ──
function seedIfEmpty() {
  if (getItems().length > 0) return;
  const today = new Date();
  function d(offset) {
    const dt = new Date(today);
    dt.setDate(dt.getDate() + offset);
    return dt.toISOString().split('T')[0];
  }
  const seed = [
    { id: uid(), name: '돈까스 소스', cat: '소스', inDate: d(-22), expDate: d(0), memo:'' },
    { id: uid(), name: '생크림 500ml', cat: '유제품', inDate: d(-3), expDate: d(0), memo:'' },
    { id: uid(), name: '우삼겹', cat: '육류', inDate: d(-5), expDate: d(3), memo:'냉장' },
    { id: uid(), name: '참기름', cat: '소스', inDate: d(-50), expDate: d(5), memo:'' },
    { id: uid(), name: '두부 500g', cat: '채소', inDate: d(-1), expDate: d(6), memo:'' },
    { id: uid(), name: '된장', cat: '소스', inDate: d(-80), expDate: d(7), memo:'' },
    { id: uid(), name: '고추장', cat: '소스', inDate: d(-60), expDate: d(8), memo:'' },
    { id: uid(), name: '달걀 30개', cat: '기타', inDate: d(-1), expDate: d(30), memo:'' },
    { id: uid(), name: '냉동 새우', cat: '냉동식품', inDate: d(-23), expDate: d(69), memo:'냉동보관' },
    { id: uid(), name: '식용유 1.8L', cat: '기타', inDate: d(-48), expDate: d(100), memo:'' },
  ];
  saveItems(seed);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function daysLeft(expDate) {
  const exp = new Date(expDate);
  const today = new Date();
  exp.setHours(0,0,0,0); today.setHours(0,0,0,0);
  return Math.round((exp - today) / 86400000);
}

function getStatus(days) {
  if (days <= 0) return 'urgent';
  if (days <= 7) return 'warn';
  return 'ok';
}

function fmtDate(s) { return s.replace(/-/g,'.'); }

// ── RENDER LIST ──
function renderList() {
  const items = getItems().map(i => ({ ...i, days: daysLeft(i.expDate) }))
    .sort((a,b) => a.days - b.days);

  const urgent = items.filter(i => i.days <= 0);
  const soon   = items.filter(i => i.days > 0 && i.days <= 7);
  document.getElementById('stat-urgent').textContent = urgent.length;
  document.getElementById('stat-soon').textContent   = soon.length;
  document.getElementById('stat-total').textContent  = items.length;

  // alert strip
  const strip = document.getElementById('alert-strip');
  const expToday = urgent.map(i => i.name);
  if (expToday.length) {
    document.getElementById('alert-text').textContent =
      expToday.slice(0,3).join(', ') + (expToday.length > 3 ? ` 외 ${expToday.length-3}건` : '') + '이 오늘 소비기한 마감입니다.';
    strip.classList.remove('hidden');
  } else {
    strip.classList.add('hidden');
  }

  // notif badge
  document.getElementById('notif-badge').style.display = (urgent.length + soon.length > 0) ? 'block' : 'none';

  // filter
  let filtered = items;
  if (currentFilter === 'urgent') filtered = items.filter(i => i.days <= 0);
  else if (currentFilter === 'warn') filtered = items.filter(i => i.days > 0 && i.days <= 7);
  else if (currentFilter === 'ok') filtered = items.filter(i => i.days > 7);
  else if (!['all','urgent','warn','ok'].includes(currentFilter))
    filtered = items.filter(i => i.cat === currentFilter);

  const list = document.getElementById('item-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">해당하는 품목이 없습니다</div></div>';
    return;
  }

  list.innerHTML = filtered.map(item => {
    const st = getStatus(item.days);
    const pct = (() => {
      const total = Math.max(1, daysLeft(item.expDate) - daysLeft(item.inDate) + Math.max(0, item.days));
      const used = total - Math.max(0, item.days);
      return Math.min(100, Math.max(2, Math.round((used / total) * 100)));
    })();
    const badge = item.days <= 0 ? '오늘 만료' : `D-${item.days}`;
    const badgeCls = st === 'urgent' ? 'badge-urgent' : st === 'warn' ? 'badge-warn' : 'badge-ok';
    const memo = item.memo ? `<span>${item.memo}</span>` : '';
    return `
    <div class="item-card ${st}" onclick="cardTap('${item.id}')">
      <div class="item-top">
        <span class="item-name">${item.name}</span>
        <span class="item-badge ${badgeCls}">${badge}</span>
      </div>
      <div class="item-meta">
        <span>입고 ${fmtDate(item.inDate)}</span>
        <span>만료 ${fmtDate(item.expDate)}</span>
        <span>${item.cat}</span>
        ${memo}
      </div>
      <div class="progress">
        <div class="progress-fill fill-${st}" style="width:${pct}%"></div>
      </div>
      <button class="delete-btn" onclick="deleteItem(event,'${item.id}')">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>`;
  }).join('');
}

function cardTap(id) { /* future: detail view */ }
function deleteItem(e, id) {
  e.stopPropagation();
  if (!confirm('삭제하시겠습니까?')) return;
  const items = getItems().filter(i => i.id !== id);
  saveItems(items);
  renderList();
  addNotif('삭제', '품목이 삭제되었습니다', 'blue');
  renderNotifs();
}

function filterBy(el, f) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── CAMERA ──
async function toggleCamera() {
  if (cameraActive) { stopCamera(); return; }
  const btn = document.getElementById('scan-btn');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const frame = document.getElementById('scan-frame');
  const line = document.getElementById('scan-line');
  const placeholder = document.getElementById('cam-placeholder');
  const video = document.getElementById('cam-video');

  try {
    dot.className = 'status-dot active';
    txt.textContent = '카메라 권한 요청 중...';
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    frame.classList.add('show');
    line.classList.add('show');
    cameraActive = true;
    btn.textContent = '스캔 중지';
    dot.className = 'status-dot active';
    txt.textContent = '포장지의 바코드 또는 날짜를 비춰주세요';
    // simulate scan after 3s
    setTimeout(simulateScan, 3000);
  } catch(err) {
    dot.className = 'status-dot error';
    txt.textContent = '카메라 권한이 필요합니다. 직접 입력을 사용해주세요.';
    btn.textContent = '카메라 스캔 시작';
    // fallback: show manual + mock result
    setTimeout(() => { simulateScan(); }, 500);
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('cam-video');
  video.style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('scan-frame').classList.remove('show');
  document.getElementById('scan-line').classList.remove('show');
  cameraActive = false;
  document.getElementById('scan-btn').textContent = '카메라 스캔 시작';
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-text').textContent = '카메라 버튼을 눌러 스캔하세요';
}

const mockItems = [
  { name: '국산 등심 500g', cat: '육류', expOffset: 4 },
  { name: '하인즈 케첩 340g', cat: '소스', expOffset: 83 },
  { name: '서울우유 요거트', cat: '유제품', expOffset: 10 },
  { name: '냉동 만두 350g', cat: '냉동식품', expOffset: 120 },
  { name: '깻잎 한 묶음', cat: '채소', expOffset: 5 },
];

function simulateScan() {
  const mock = mockItems[Math.floor(Math.random() * mockItems.length)];
  const today = new Date().toISOString().split('T')[0];
  const expDt = new Date(); expDt.setDate(expDt.getDate() + mock.expOffset);
  const expDate = expDt.toISOString().split('T')[0];
  const days = mock.expOffset;

  document.getElementById('r-name').textContent = mock.name;
  document.getElementById('r-cat').textContent  = mock.cat;
  document.getElementById('r-in').textContent   = fmtDate(today);
  document.getElementById('r-exp').textContent  = fmtDate(expDate);
  document.getElementById('r-days').textContent = days <= 0 ? '오늘 만료' : `${days}일`;
  document.getElementById('r-days').style.color = days <= 0 ? 'var(--red)' : days <= 7 ? 'var(--amber)' : 'var(--green)';
  document.getElementById('ai-result').classList.add('show');

  document.getElementById('f-name').value = mock.name;
  document.getElementById('f-cat').value  = mock.cat;
  document.getElementById('f-in').value   = today;
  document.getElementById('f-exp').value  = expDate;
  document.getElementById('manual-form').style.display = 'block';
  manualOpen = true;

  document.getElementById('status-dot').className = 'status-dot done';
  document.getElementById('status-text').textContent = '인식 완료! 정보를 확인 후 등록하세요.';
  stopCamera();
}

function toggleManual() {
  manualOpen = !manualOpen;
  document.getElementById('manual-form').style.display = manualOpen ? 'block' : 'none';
  if (manualOpen && !document.getElementById('f-in').value) {
    document.getElementById('f-in').value = new Date().toISOString().split('T')[0];
  }
}

function saveItem() {
  const name    = document.getElementById('f-name').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const inDate  = document.getElementById('f-in').value;
  const expDate = document.getElementById('f-exp').value;
  const memo    = document.getElementById('f-memo').value.trim();
  if (!name || !inDate || !expDate) { alert('상품명, 입고일, 소비기한은 필수입니다.'); return; }

  const items = getItems();
  items.unshift({ id: uid(), name, cat, inDate, expDate, memo });
  saveItems(items);

  const days = daysLeft(expDate);
  addNotif(name, `소비기한 ${fmtDate(expDate)} 등록됨 · ${days <= 0 ? '오늘 만료' : `${days}일 남음`}`, 'green');
  renderNotifs();

  document.getElementById('f-name').value = '';
  document.getElementById('f-in').value   = '';
  document.getElementById('f-exp').value  = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('ai-result').classList.remove('show');
  document.getElementById('manual-form').style.display = 'none';
  manualOpen = false;

  renderList();
  switchPage('list');
}

// ── NOTIFICATIONS ──
function addNotif(title, sub, type) {
  const notifs = getNotifs();
  notifs.unshift({ id: uid(), title, sub, type, time: new Date().toISOString() });
  saveNotifs(notifs.slice(0, 50));
}

function renderNotifs() {
  const items = getItems().map(i => ({ ...i, days: daysLeft(i.expDate) }))
    .filter(i => i.days <= 7).sort((a,b) => a.days - b.days);

  const stored = getNotifs();
  const list = document.getElementById('notif-list');
  let html = '';

  if (items.length) {
    html += '<div class="notif-group-label">소비기한 임박</div>';
    html += items.map(item => {
      const type = item.days <= 0 ? 'red' : item.days <= 3 ? 'red' : 'amber';
      const icon = item.days <= 0 ? '!' : item.days;
      return `<div class="notif-card">
        <div class="notif-icon ni-${type}">${icon}</div>
        <div class="notif-body">
          <div class="notif-title">${item.name}</div>
          <div class="notif-sub">${item.days <= 0 ? '오늘이 소비기한입니다. 즉시 사용하세요.' : `${fmtDate(item.expDate)}까지 · ${item.days}일 남았습니다.`}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (stored.length) {
    html += '<div class="notif-group-label">최근 활동</div>';
    html += stored.slice(0,10).map(n => {
      const t = new Date(n.time);
      const timeStr = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      return `<div class="notif-card">
        <div class="notif-icon ni-${n.type}">+</div>
        <div class="notif-body">
          <div class="notif-title">${n.title}</div>
          <div class="notif-sub">${n.sub}</div>
          <div class="notif-time">${timeStr}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (!html) {
    html = '<div class="empty"><div class="empty-icon">🔔</div><div class="empty-text">알림이 없습니다</div></div>';
  }
  list.innerHTML = html;
}

// ── PUSH NOTIFICATION SETUP ──
async function setupPushNotifications() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
  try {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      scheduleNotifications();
    }
  } catch(e) {}
}

function scheduleNotifications() {
  if (!('Notification' in window)) return;
  const items = getItems().map(i => ({ ...i, days: daysLeft(i.expDate) }));
  const urgent = items.filter(i => i.days <= 0);
  const soon   = items.filter(i => i.days > 0 && i.days <= 7);
  if (urgent.length) {
    new Notification('not JJAM — 긴급 소진 필요', {
      body: urgent.map(i => i.name).join(', ') + ' 소비기한 만료',
      icon: '/icon-192.png', badge: '/icon-192.png', tag: 'urgent'
    });
  } else if (soon.length) {
    new Notification('not JJAM — 소비기한 임박', {
      body: soon[0].name + ` 외 ${soon.length-1}건 1주일 내 만료`,
      icon: '/icon-192.png', badge: '/icon-192.png', tag: 'soon'
    });
  }
}

// ── STORE MODAL ──
function openStoreModal() {
  document.getElementById('store-list').innerHTML = STORES.map(s => `
    <div class="store-opt ${s===currentStore?'selected':''}" onclick="selectStore('${s}')">
      <div class="store-opt-dot"></div>
      <span class="store-opt-name">${s}</span>
      <span class="store-opt-check">✓</span>
    </div>`).join('');
  document.getElementById('store-modal').classList.add('show');
}
function closeStoreModal(e) {
  if (e.target.id === 'store-modal') document.getElementById('store-modal').classList.remove('show');
}
function selectStore(name) {
  currentStore = name;
  localStorage.setItem('currentStore', name);
  document.getElementById('current-store-name').textContent = name;
  document.getElementById('store-modal').classList.remove('show');
  seedIfEmpty();
  renderList();
}

// ── NAVIGATION ──
function switchPage(page) {
  ['list','scan','notif'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('active', p === page);
    document.getElementById('nav-' + p).classList.toggle('active', p === page);
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['list','scan','notif'][i] === page);
  });
  if (page === 'notif') renderNotifs();
  if (page !== 'scan' && cameraActive) stopCamera();
}

// ── INSTALL BANNER (iOS) ──
function checkInstallBanner() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('installDismissed');
  if (isIOS && !isStandalone && !dismissed) {
    document.getElementById('install-banner').classList.add('show');
    localStorage.setItem('installDismissed', '1');
  }
}

// ── INIT ──
seedIfEmpty();
renderList();
checkInstallBanner();
setupPushNotifications();

// Auto-check every minute
setInterval(() => { renderList(); renderNotifs(); }, 60000);

// Daily notification at 8am
function scheduleDailyCheck() {
  const now = new Date();
  const next8am = new Date(now);
  next8am.setHours(8, 0, 0, 0);
  if (next8am <= now) next8am.setDate(next8am.getDate() + 1);
  const delay = next8am - now;
  setTimeout(() => {
    scheduleNotifications();
    setInterval(scheduleNotifications, 86400000);
  }, delay);
}
scheduleDailyCheck();
</script>
